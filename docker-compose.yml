services:
  db:
    image: postgres:16-alpine
    container_name: tft_analytics_postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: tft_analytics_db
      POSTGRES_USER: tft_analytics_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - tft_analytics_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tft_analytics_user -d tft_analytics_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  tft_analytics_postgres_data:

